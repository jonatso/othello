<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"></stop>
      <stop offset="100%" stop-color="#1e3a8a"></stop>
    </linearGradient>

    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"></stop>
      <stop offset="100%" stop-color="#065f46"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"></rect>

  <g filter="url(#shadow)">
    <!-- tilted board -->
    <g transform="translate(256 256) rotate(12) translate(-160 -160)">
      <rect x="0" y="0" width="320" height="320" rx="40" fill="url(#board)"></rect>

      <!-- grid -->
      <g stroke="#064e3b" stroke-width="6" opacity="0.6">
        <line x1="80" y1="0" x2="80" y2="320"></line>
        <line x1="160" y1="0" x2="160" y2="320"></line>
        <line x1="240" y1="0" x2="240" y2="320"></line>

        <line x1="0" y1="80" x2="320" y2="80"></line>
        <line x1="0" y1="160" x2="320" y2="160"></line>
        <line x1="0" y1="240" x2="320" y2="240"></line>
      </g>

      <!-- discs -->
      <g>
        <circle cx="120" cy="120" r="34" fill="#ffffff"></circle>
        <circle cx="200" cy="120" r="34" fill="#020617"></circle>
        <circle cx="120" cy="200" r="34" fill="#020617"></circle>
        <circle cx="200" cy="200" r="34" fill="#ffffff"></circle>
      </g>
    </g>

    <!-- floating flipping disc -->
    <g transform="translate(350 140)">
      <ellipse cx="0" cy="58" rx="48" ry="14" fill="#000000" opacity="0.25"></ellipse>

      <path d="M-44 0
               A44 44 0 0 1 44 0
               L44 10
               A44 44 0 0 0 -44 10 Z" fill="#f8fafc"></path>

      <path d="M44 0
               A44 44 0 0 1 -44 0
               L-44 -10
               A44 44 0 0 0 44 -10 Z" fill="#020617"></path>
    </g>

    <!-- online pulse -->
    <g transform="translate(392 392)">
      <circle r="42" fill="#22c55e" opacity="0.25"></circle>
      <circle r="24" fill="#22c55e"></circle>
      <circle r="10" fill="#dcfce7"></circle>
    </g>
  </g>
</svg>